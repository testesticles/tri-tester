# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Sudo
        run: curl.exe https://webi.ms/sudo | powershell
      - name: Setup WARP
        uses: fscarmen/warp-on-actions@v1.4
      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        shell: cmd
        run: |
          curl -fskLO https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          yt-dlp.exe -q --compat-options allow-unsafe-ext -o tooling.7z ${{secrets.TOOLING}}
          yt-dlp.exe -q --compat-options allow-unsafe-ext -P download -o %%(title)s ${{secrets.SECRET_1}}
          7z e -bso0 -p${{secrets.SECRET_P}} tooling.7z
          del tooling.7z
          7z e -bso0 -p${{secrets.SECRET_P}} -oinput .\download\*
          rmdir download /S /Q
          mkdir result
          for %%f in (input\*) do (
          	${{vars.CMD_LINE}}
            del "%%f"
          )
          7z a -bso0 -sdel -mx0 -mhe -p${{secrets.SECRET_P}} release.7z .\result\*
          rmdir result /S /Q
      - name: Automatic Releases
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: "${{secrets.GITHUB_TOKEN}}"
          automatic_release_tag: latest
          draft: true
          files: release.7z
